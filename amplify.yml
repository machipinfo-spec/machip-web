version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - node -e "const keys = ['AUTH_TRUST_HOST', 'NEXTAUTH_TRUST_HOST', 'NEXTAUTH_URL', 'AUTH_URL', 'COGNITO_CLIENT_ID', 'COGNITO_CLIENT_SECRET', 'COGNITO_ISSUER', 'NEXTAUTH_SECRET', 'GOOGLE_APPLICATION_CREDENTIALS_JSON', 'NEXT_PUBLIC_API_URL', 'NEXT_PUBLIC_GOOGLE_MAPS_API_KEY', 'NEXT_PUBLIC_GOOGLE_MAP_ID', 'NEXT_PUBLIC_FIREBASE_API_KEY', 'NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN', 'NEXT_PUBLIC_FIREBASE_PROJECT_ID', 'NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET', 'NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID', 'NEXT_PUBLIC_FIREBASE_APP_ID', 'NEXT_PUBLIC_FIREBASE_VAPID_KEY', 'BLOB_BASE_URL', 'IS_STG', 'COGNITO_LOGOUT_REDIRECT_URI']; require('fs').writeFileSync('.env.production', keys.map(k => k + '=' + (process.env[k] || '')).join('\n'));"
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
