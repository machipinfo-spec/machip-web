openapi: 3.0.0
info:
  title: Tetra Backend API
  description: API for Tetra Backend
  version: 1.0.0

servers:
  - url: https://${TetraApiEndpoint}
    description: Production API Endpoint

components:
  securitySchemes:
    CognitoAuthorizer:
      type: nodejs22.x # AWS Lambda Authorizer in implementation, but for swagger UI often uses Bearer
      type: apiKey
      in: header
      name: Authorization
      description: Cognito ID Token (Bearer <token>)

  schemas:
    User:
      type: object
      properties:
        authId:
          type: string
        userId:
          type: string
        name:
          type: string
        email:
          type: string
    
    PointInfo:
      type: object
      properties:
        id:
          type: string
        lat:
          type: number
        lng:
          type: number
        threadName:
          type: string
        category:
          type: string
        threadId:
          type: string
        imageUrl:
          type: string
          nullable: true
        selectDate:
          type: string
          format: date-time
          nullable: true
        startDate:
          type: string
          format: date-time
          nullable: true
        endDate:
          type: string
          format: date-time
          nullable: true
        detail:
          type: string
          nullable: true
        url:
          type: string
          nullable: true

    EventPoint:
      type: object
      properties:
        id:
          type: string
        lat:
          type: number
        lng:
          type: number
        threadName:
          type: string
        category:
          type: string
        threadId:
          type: string
        imageUrl:
          type: string
          nullable: true
        startDate:
          type: string
          format: date-time
          nullable: true
        endDate:
          type: string
          format: date-time
          nullable: true
        detail:
          type: string
          nullable: true
        url:
          type: string
          nullable: true

    ChatPoint:
      type: object
      properties:
        id:
          type: string
        lat:
          type: number
        lng:
          type: number
        threadName:
          type: string
        category:
          type: string
        threadId:
          type: string
        imageUrl:
          type: string
          nullable: true

    Thread:
      type: object
      properties:
        id:
          type: string
        threadName:
          type: string
        createdAt:
          type: string
          format: date-time
        startDate:
          type: string
          format: date-time
          nullable: true
        endDate:
          type: string
          format: date-time
          nullable: true
        ownerUserId:
          type: string
        parentThreadId:
          type: string
          nullable: true
        childThreadIds:
          type: array
          items:
            type: string
        imageUrl:
          type: string
          nullable: true

    Profile:
      type: object
      properties:
        profileId:
          type: string
        userId:
          type: string
        userName:
          type: string
        imageUrl:
          type: string
        introduction:
          type: string
        url:
          type: string
          nullable: true

    Message:
      type: object
      # Generic message structure approximation
      properties:
        id:
          type: string
        type:
          type: string
          enum: [system, reply, ai, newEvent]
        subject:
          type: string
        content:
          type: object # Polymorphic content
        senderId:
          type: string
        createdAt:
          type: string
          format: date-time

security:
  - CognitoAuthorizer: []

paths:
  # ============================
  #  Admin APIs
  # ============================
  /admin/users:
    get:
      summary: List Users (Admin)
      description: Get a list of users for administration purposes.
      # security: [] # Auth not required for localhost testing
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
        - in: query
          name: nextToken
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
            description: Search by name or email
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                  nextToken:
                    type: string
                    nullable: true

  /admin/users/{userId}:
    get:
      summary: Get User Detail (Admin)
      # security: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /admin/inbox/messages:
    post:
      summary: Send System Message (Admin)
      description: Send a system notification to specific users or all users.
      # security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subject, content, targetUserIds]
              properties:
                subject:
                  type: string
                  example: "Important Announcement"
                content:
                  type: string
                  example: "System maintenance scheduled..."
                targetUserIds:
                  oneOf:
                    - type: array
                      items:
                        type: string
                      description: List of User IDs
                    - type: string
                      enum: [all]
                      description: Send to all users
              example:
                subject: "Welcome"
                content: "Welcome to Tetra!"
                targetUserIds: ["user-id-1", "user-id-2"]
      responses:
        '200':
          description: Message sent successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  deliveredCount:
                    type: integer
                  broadcastId:
                    type: string
                    nullable: true

  # ============================
  #  Existing APIs
  # ============================
  /user:
    get:
      summary: Get User Info
      security:
        - CognitoAuthorizer: []
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '403':
          description: Forbidden - User not found in DB (even if authenticated)
        '401':
          description: Unauthorized

    post:
      summary: Create User
      security:
        - CognitoAuthorizer: []
      description: Creates a user based on Cognito claims (email, username).
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Bad Request (Missing claims)

    delete:
      summary: Delete User
      security:
        - CognitoAuthorizer: []
      responses:
        '200':
          description: User deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /user/profile:
    post:
      summary: Create Profile
      security:
        - CognitoAuthorizer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userName, imageBase64, introduction]
              properties:
                userName:
                  type: string
                imageBase64:
                  type: string
                introduction:
                  type: string
                url:
                  type: string
                  nullable: true
      responses:
        '201':
          description: Profile created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'

    put:
      summary: Update Profile
      security:
        - CognitoAuthorizer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userName:
                  type: string
                imageBase64:
                  type: string
                introduction:
                  type: string
                url:
                  type: string
                  nullable: true
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'

  /user/profile/{userId}:
    get:
      summary: Get Profile
      security: [] # Public access allowed? Handler check says auth needed for @self
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
          description: User ID or '@self'
      responses:
        '200':
          description: Profile found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
        '404':
          description: Profile not found

  /user/bookmark:
    get:
      summary: Get Bookmarked Threads
      description: 自分がブックマークしたスレッドの一覧を取得します。
      security:
        - CognitoAuthorizer: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: ブックマークされたスレッドの一覧
          content:
            application/json:
              schema:
                type: object
                properties:
                  threads:
                    type: array
                    items:
                      $ref: '#/components/schemas/Thread'
        '401':
          description: 認証エラー

    post:
      summary: Bookmark a Thread
      description: 指定したスレッドをブックマークに登録します。
      security:
        - CognitoAuthorizer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [threadId]
              properties:
                threadId:
                  type: string
      responses:
        '200':
          description: ブックマーク登録成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '400':
          description: 不正なリクエスト (UUIDフォーマットエラーなど)
        '401':
          description: 認証エラー

    delete:
      summary: Unbookmark a Thread
      description: 指定したスレッドのブックマークを解除します。
      security:
        - CognitoAuthorizer: []
      parameters:
        - in: query
          name: threadId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: ブックマーク解除成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '400':
          description: 不正なリクエスト
        '401':
          description: 認証エラー

  /user/follow:
    post:
      summary: Follow a User
      description: 指定したユーザーをフォローします。自分自身をフォローすることはできません。
      security:
        - CognitoAuthorizer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [targetUserId]
              properties:
                targetUserId:
                  type: string
      responses:
        '200':
          description: フォロー成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '400':
          description: 不正なリクエスト (自分自身へのフォローなど)
        '401':
          description: 認証エラー

    delete:
      summary: Unfollow a User
      description: 指定したユーザーのフォローを解除します。
      security:
        - CognitoAuthorizer: []
      parameters:
        - in: query
          name: targetUserId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: フォロー解除成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '400':
          description: 不正なリクエスト
        '401':
          description: 認証エラー

  /user/following:
    get:
      summary: Get Following Users Profiles
      description: 自分がフォローしているユーザーのプロフィール一覧を取得します。
      security:
        - CognitoAuthorizer: []
      responses:
        '200':
          description: フォロー中ユーザーのプロフィール一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Profile'
        '401':
          description: 認証エラー

  /map:
    get:
      summary: Get Point Info List
      security: [] # handlerUtil.getAuthId is called but Optional? "if (authId) { ... }"
      parameters:
        - in: query
          name: threadName
          schema:
            type: string
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        '200':
          description: List of points
          content:
            application/json:
              schema:
                type: array
                items:
                  oneOf:
                    - $ref: '#/components/schemas/EventPoint'
                    - $ref: '#/components/schemas/ChatPoint'

  /map/event:
    post:
      summary: Create Event Point
      security:
        - CognitoAuthorizer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [lat, lng, threadName, startDate, endDate]
              properties:
                lat:
                  type: number
                lng:
                  type: number
                threadName:
                  type: string
                imageBase64:
                  type: string
                startDate:
                  type: string
                  format: date-time
                endDate:
                  type: string
                  format: date-time
                detail:
                  type: string
                url:
                  type: string
      responses:
        '201':
          description: Event Point created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventPoint'

  /map/chat:
    post:
      summary: Create Chat Point
      security:
        - CognitoAuthorizer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [lat, lng, threadName]
              properties:
                lat:
                  type: number
                lng:
                  type: number
                threadName:
                  type: string
                imageBase64:
                  type: string
      responses:
        '201':
          description: Chat Point created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatPoint'

  /timeline:
    get:
      summary: Get Timeline (Thread List)
      security: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: offset
          schema:
            type: integer
      responses:
        '200':
          description: List of threads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Thread'

  /timeline/thread:
    get:
      summary: Get Thread or Thread List by Owner
      description: 指定したスレッド、もしくは特定ユーザー（ownerUserId）が投稿したスレッド一覧を取得します。※ownerUserIdを指定して特定ユーザーの投稿一覧を取得する場合、CognitoAuthorizerによる認証（Authorizationヘッダー）が必須となります。
      security:
        - CognitoAuthorizer: []
      parameters:
        - in: query
          name: threadId
          schema:
            type: string
        - in: query
          name: ownerUserId
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: includeChildren
          schema:
            type: boolean
        - in: query
          name: offset
          schema:
            type: integer
      responses:
        '200':
          description: Thread object or List of threads
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/Thread'
                  - type: array
                    items:
                      $ref: '#/components/schemas/Thread'

    post:
      summary: Create Thread
      security:
        - CognitoAuthorizer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [threadName]
              properties:
                threadName:
                  type: string
                parentThreadId:
                  type: string
                imageBase64:
                  type: string
      responses:
        '201':
          description: Thread created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Thread'

    delete:
      summary: Delete Thread
      security:
        - CognitoAuthorizer: []
      parameters:
        - in: query
          name: threadId
          required: true
          schema:
            type: string
        - in: query
          name: deleteChildren
          schema:
            type: boolean
            default: true
        - in: query
          name: soft
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Thread deleted success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string

  /inbox:
    get:
      summary: Get User Messages
      security:
        - CognitoAuthorizer: []
      parameters:
        - in: query
          name: type
          schema:
            type: string
        - in: query
          name: isRead
          schema:
            type: boolean
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: offset
          schema:
            type: integer
      responses:
        '200':
          description: User messages
          content:
            application/json:
              schema:
                type: object # Define more strictly if needed
                properties:
                    items:
                        type: array
                        items:
                            $ref: '#/components/schemas/Message'
                    count:
                        type: number

  /inbox/summary:
    get:
      summary: Get Inbox Summary
      security:
        - CognitoAuthorizer: []
      responses:
        '200':
          description: Summary info
          content:
            application/json:
              schema:
                type: object
                properties:
                    unreadCount:
                        type: integer

    put:
      summary: Mark All As Read (Alias)
      security:
        - CognitoAuthorizer: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  default: all
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                 type: object
                 properties:
                    success:
                        type: boolean

  /inbox/read-all:
    put:
      summary: Mark All As Read
      security:
        - CognitoAuthorizer: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  default: all
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                 type: object
                 properties:
                    success:
                        type: boolean
  
  /inbox/{messageId}:
    get:
      summary: Get Message Detail
      security:
         - CognitoAuthorizer: []
      parameters:
        - in: path
          name: messageId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Message detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '404':
            description: Not found

    delete:
       summary: Delete User Message
       security:
         - CognitoAuthorizer: []
       parameters:
        - in: path
          name: messageId
          required: true
          schema:
            type: string
       responses:
         '200':
           description: Deleted
           content:
             application/json:
               schema:
                 type: object
                 properties:
                   success:
                     type: boolean

  /inbox/{messageId}/read:
    put:
       summary: Mark Message As Read
       security:
         - CognitoAuthorizer: []
       parameters:
        - in: path
          name: messageId
          required: true
          schema:
            type: string
       responses:
         '200':
           description: Updated
           content:
             application/json:
               schema:
                 type: object
                 properties:
                   success:
                     type: boolean
